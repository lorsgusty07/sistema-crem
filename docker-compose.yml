services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistema-crem-frontend-prod
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema-crem-backend-prod
    ports:
      - "8000:80"
    restart: unless-stopped
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sistema_crem
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - FRONTEND_URL=http://localhost:3001
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: sistema-crem-db-prod
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=sistema_crem
      - MYSQL_ROOT_PASSWORD=secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
