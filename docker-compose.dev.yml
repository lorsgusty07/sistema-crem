services:
  frontend:
    image: node:22-alpine
    container_name: sistema-crem-frontend-dev
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema-crem-backend-dev
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sistema_crem
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - FRONTEND_URL=http://localhost:3001
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: sistema-crem-db-dev
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=sistema_crem
      - MYSQL_ROOT_PASSWORD=secret
    ports:
      - "3306:3306"
    volumes:
      - db_data_dev:/var/lib/mysql

volumes:
  db_data_dev:
